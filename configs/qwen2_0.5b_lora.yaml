#########################################################
# Qwen2.5-0.5B with LoRA fine-tuning (4GB VRAM)
# Recommended for consumer GPUs
#########################################################

seed: 42

# Language Model parameters
model_name: Qwen/Qwen2.5-0.5B-Instruct
max_seq_length: 1024
system_prompt: |
  You control a web browser. Given the page structure below,
  respond with exactly ONE action.

  Actions: click(bid), fill(bid, text), noop()

  Example: if you see [13] button 'Submit', respond: click('13')

  Respond with ONLY the action, nothing else.

# BrowserGym environment
browsergym_url: http://browsergym-env:7860
dataset_size: 200
default_goal: Click the button.

# Training hyperparameters
learning_rate: 5.0e-4
warmup_steps: 10

# Generation settings — more generations = better GRPO signal
per_device_train_batch_size: 1
num_generations: 4
generation_batch_size: 4
max_steps: 5
max_completion_length: 16

# vLLM disabled for 4GB VRAM safety
use_vllm: false
vllm_mode: "colocate"
vllm_gpu_memory_utilization: 0.3

# 4-bit quantization for fitting in 4GB VRAM
use_4bit: true
bnb_4bit_compute_dtype: "float16"
bnb_4bit_quant_type: "nf4"

# LoRA configuration
use_peft: true
lora_r: 8
lora_alpha: 16
lora_dropout: 0.0
lora_bias: "none"
use_rslora: false
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# Gradient checkpointing (saves VRAM at cost of speed)
gradient_checkpointing: true

# Experiment tracking
wandb_enabled: true
wandb_project_name: "browser-control-grpo"
logging_steps: 1
push_to_hf: false
