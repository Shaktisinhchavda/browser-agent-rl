#########################################################
# Qwen2.5-0.5B with LoRA fine-tuning (4GB VRAM)
# Recommended for consumer GPUs
#########################################################

seed: 42

# Language Model parameters
model_name: Qwen/Qwen2.5-0.5B
max_seq_length: 1024
system_prompt: |
  You control a web browser through BrowserGym actions.
  You must complete the given web task by interacting with the page.

  Available actions:
  - noop() - Do nothing
  - click(bid) - Click element with BrowserGym ID (the number in brackets)
  - fill(bid, text) - Fill input field with text
  - send_keys(text) - Send keyboard input
  - scroll(direction) - Scroll up/down

  The page structure shows elements as: [bid] element_type 'element_text'
  For example: [13] button 'Click Me!' means bid='13'

  Reply with exactly ONE action on a single line, e.g.:
  click('13')
  fill('42', 'hello world')
  noop()

  Do not include explanations or multiple actions.

# BrowserGym environment
browsergym_url: http://browsergym-env:7860
dataset_size: 50
default_goal: Complete the web task successfully.

# Training hyperparameters (tuned for LoRA + 4GB VRAM)
learning_rate: 1.0e-4
warmup_steps: 5

# vLLM inference (memory-constrained settings)
per_device_train_batch_size: 1
num_generations: 2
generation_batch_size: 2
max_steps: 5
max_completion_length: 32

# vLLM disabled — use standard model.generate() to avoid OOM on 4GB VRAM
use_vllm: false
vllm_mode: "colocate"
vllm_gpu_memory_utilization: 0.3

# 4-bit quantization for fitting in 4GB VRAM
use_4bit: true
bnb_4bit_compute_dtype: "float16"
bnb_4bit_quant_type: "nf4"

# LoRA configuration (ENABLED)
use_peft: true
lora_r: 8
lora_alpha: 16
lora_dropout: 0.0
lora_bias: "none"
use_rslora: false
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# Gradient checkpointing (saves VRAM at cost of speed)
gradient_checkpointing: true

# Experiment tracking
wandb_enabled: true
wandb_project_name: "browser-control-grpo"
logging_steps: 1
push_to_hf: false
